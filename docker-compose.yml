services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ioflow
      POSTGRES_USER: ioflow
      POSTGRES_PASSWORD: ioflow
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ioflow"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
