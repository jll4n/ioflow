name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job principal : format, check, clippy, tests
  # Exclut com-bridge (Windows + i686 uniquement).
  # ────────────────────────────────────────────────────────────────────────────
  ci:
    name: CI (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain Rust stable (clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # ── Format ──────────────────────────────────────────────────────────────
      - name: Vérification du format (rustfmt)
        run: cargo fmt --all --check

      # ── Check ───────────────────────────────────────────────────────────────
      # com-bridge est exclu : il dépend de windows-rs et d'une cible i686.
      - name: cargo check (workspace, sans com-bridge)
        run: cargo check --workspace --exclude com-bridge

      # ── Clippy ──────────────────────────────────────────────────────────────
      - name: Clippy (workspace, sans com-bridge)
        run: cargo clippy --workspace --exclude com-bridge -- -D warnings

      # ── Tests ───────────────────────────────────────────────────────────────
      - name: Tests (workspace, sans com-bridge)
        run: cargo test --workspace --exclude com-bridge

  # ────────────────────────────────────────────────────────────────────────────
  # Job com-bridge : vérification uniquement sur Windows + target i686
  # Pas de tests — les appels COM/UDE nécessitent Control Expert installé.
  # ────────────────────────────────────────────────────────────────────────────
  com-bridge:
    name: com-bridge check (Windows i686)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain Rust stable + target i686-pc-windows-msvc
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo check com-bridge (x86, sans feature com)
        run: cargo check -p com-bridge --target i686-pc-windows-msvc
